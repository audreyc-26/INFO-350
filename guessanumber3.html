<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
	<style> .btn{border:1px solid black; padding:5px;display:inline-block} </style>
</head>
<body>

<h1>Guess a number</h1>

<p>Press the following button to start a game</p>
<input type="button" class="btn btn-primary" id="btn_start_game" value="Start Game">

<p></p>

<input type="button" class="btn btn-secondary" id="btn_reset_game" value="Reset Game" disabled>

<p></p>

<p>Enter your guess below after starting the game and press "Try this guess:"</p>
<input type="text" id="user_guess" value="50" disabled> 
<input type="button" class="btn btn-primary" id="btn_guess" value="Try this guess:" disabled>

<p id="game_message"></p>

<script>
	var ipAddressAndPort = "ec2-3-82-191-30.compute-1.amazonaws.com:8080";
	var gameId = 0;
	var userGuess = 0;
	var guessCount = 0;
	var maxGuesses = 5;

	$('#btn_start_game').click(function(){
		gameId = Math.floor(Math.random() * 1000000)+1;
		guessCount = 0;

		document.getElementById("user_guess").disabled = false;
		document.getElementById("btn_guess").disabled = false;
		document.getElementById("btn_reset_game").disabled = false;
		document.getElementById("btn_start_game").disabled = true;

		document.getElementById("game_message").innerHTML = "";

		$.post('http://' + ipAddressAndPort + '/startgame',
		{'gameId': gameId}, function(data){
			alert(data["APIMessage"]); // Popup to confirm game start
		});
	});

	$('#btn_guess').click(function(){
		userGuess = parseInt(document.getElementById("user_guess").value);

		if (userGuess < 1 || userGuess > 100){
			alert("Please enter a number between 1 and 100"); // Popup for invalid input
			return;
		}

		guessCount++;

		$.get('http://' + ipAddressAndPort + '/guessMade',
		{'gameId': gameId, "userGuess": userGuess}, function(data){

			let guessesLeft = maxGuesses - guessCount;

			let message = "This is guess number " + guessCount +
			". You have " + guessesLeft + " guesses left.";

			// Popup for result
			alert(message + "\n" + data["APIMessage"]);

			// WIN
			if (data["guessed"] == true){
				alert("Congratulations! You won!");
				endGame();
			}

			// LOSE
			else if (guessCount >= maxGuesses){
				alert("You lost! The number was " + data["answer"]);
				endGame();
			}

			document.getElementById("game_message").innerHTML = message;
		});
	});

	//  Reset
	$('#btn_reset_game').click(function(){

		// reset values
		gameId = 0;
		guessCount = 0;

		// reset UI
		document.getElementById("user_guess").value = 50;
		document.getElementById("user_guess").disabled = true;

		document.getElementById("btn_guess").disabled = true;
		document.getElementById("btn_reset_game").disabled = true;
		document.getElementById("btn_start_game").disabled = false;

		document.getElementById("game_message").innerHTML = "";

		alert("Game has been reset."); // Popup for game reset
	});

	function endGame(){
		document.getElementById("btn_guess").disabled = true;
		document.getElementById("btn_reset_game").disabled = true;
		document.getElementById("btn_start_game").disabled = false;
	}
</script>

</body>
</html>
